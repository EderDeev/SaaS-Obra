[build]
builder = "railpack"
buildCommand = "npm run build && (php artisan storage:link || true)"

[deploy]
startCommand = "sh ./railway/start-app.sh"
preDeployCommand = ["sh ./railway/init-app.sh"]
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
