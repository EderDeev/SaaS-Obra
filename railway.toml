[build]
builder = "railpack"
buildCommand = "npm run build && (php artisan storage:link || true)"

[deploy]
startCommand = "php -d upload_max_filesize=64M -d post_max_size=64M -d memory_limit=512M artisan serve --host=0.0.0.0 --port=${PORT}"
preDeployCommand = ["sh ./railway/init-app.sh"]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
